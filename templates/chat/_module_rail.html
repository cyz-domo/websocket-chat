<aside class="module-rail panel-card">
    <div class="module-rail-list">
        {% if include_lobby_entry %}

            {% else %}
                <a class="module-link module-link-icon {% if active_section == 'lobby' %}active{% endif %}" href="{% url 'chat_index' %}" title="消息中心" aria-label="消息中心">
            {% endif %}
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                    <path d="M4 6h16v12H4z"/>
                    <path d="M4 10l6.5 5L17 10"/>
                </svg>
                <span class="module-link-label">消息中心</span>
            {% if use_buttons %}
                </button>
            {% else %}
                </a>
            {% endif %}
        {% endif %}
        {% if active_section != 'moments' %}
        {% if use_buttons %}
            <button class="module-link module-link-icon {% if active_section == 'friends' %}active{% endif %}" type="button" data-panel-target="friends" title="好友" aria-label="好友">
